<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Application Form</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <h1>Career Application Form</h1>

  <form>

    <label for="name">Full Name</label>
    <input
      type="text"
      id="name"
      placeholder="Enter your full name"
      required
    >

    <label for="email">Email Address</label>
    <input
      type="email"
      id="email"
      placeholder="Enter your email"
      required
    >

    <label for="position">Desired Position</label>

    <select id="position" required>
      <option value="">Choose a position</option>
      <option>Frontend Developer</option>
      <option>Backend Developer</option>
      <option>Full Stack Developer</option>
      <option>UI/UX Designer</option>
    </select>

    <fieldset class="radio-group">

      <legend>Availability</legend>

      <input type="radio" id="full" name="availability">
      <label for="full">Full-Time</label>

      <input type="radio" id="part" name="availability">
      <label for="part">Part-Time</label>

    </fieldset>

    <label for="message">Tell us about yourself</label>

    <textarea
      id="message"
      rows="6"
      placeholder="Write a short introduction..."
      required
    ></textarea>

    <button type="submit">
      Submit Application
    </button>

  </form>

</div>

</body>
</html>
