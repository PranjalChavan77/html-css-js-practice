<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Selection</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Feature Selection</h1>

<div class="feature-card-container">

    <label class="feature-card">
        <input type="checkbox">
        <h2>Dark Mode</h2>
        <p>Comfortable viewing experience at night.</p>
    </label>

    <label class="feature-card">
        <input type="checkbox">
        <h2>Cloud Backup</h2>
        <p>Securely save your important files.</p>
    </label>

    <label class="feature-card">
        <input type="checkbox">
        <h2>Push Notifications</h2>
        <p>Receive instant updates and alerts.</p>
    </label>

    <label class="feature-card">
        <input type="checkbox">
        <h2>Offline Access</h2>
        <p>Continue working without internet.</p>
    </label>

    <label class="feature-card">
        <input type="checkbox">
        <h2>Multi Language</h2>
        <p>Use the application in different languages.</p>
    </label>

    <label class="feature-card">
        <input type="checkbox">
        <h2>Auto Sync</h2>
        <p>Automatically sync your data across devices.</p>
    </label>

</div>

</body>
</html>
