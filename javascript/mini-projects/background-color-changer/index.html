<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="colorChanger.css">
    <title>Background Color Changer</title>
</head>
<body>
    <div> 
    <h1>Background Color Changer</h1>
    <span class="button" id="yellow">YELLOW</span>
    <span class="button" id="blue">BLUE</span>
    <span class="button" id="pink">PINK</span>
    <span class="button" id="grey">GREY</span> 
    <span class="button" id="red">RED</span> 
    <span class="button" id="lightblue">LIGHTBLUE</span> 
    <h3>Click on one of the colors above 
        <span>to change the background color of the page!</span>
    </h3>
    </div>
    <script src="bgcolorChanger.js"></script>
</body>
</html>
